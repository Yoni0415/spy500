name: Escuchar Telegram

on:
  schedule:
    - cron: "*/10 * * * *"   # cada ~10 minutos, todo el dia
  workflow_dispatch: {}

permissions:
  contents: write   # para commitear la cartera cifrada cuando cambia

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Revisar mensajes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO_KEY: ${{ secrets.PORTFOLIO_KEY }}
          COMMISSION_PCT: ${{ vars.COMMISSION_PCT }}
          TRIGGER_CODE: ${{ vars.TRIGGER_CODE }}
        run: python listen.py

      - name: Guardar cartera si cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.enc
          git diff --staged --quiet && echo "Cartera sin cambios." && exit 0
          git commit -m "Actualizar cartera"
          git pull --rebase origin main
          git push
