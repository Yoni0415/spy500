name: Senal diaria SPY

on:
  schedule:
    # 21:15 UTC (~poco despues del cierre 16:00 ET / 17:15 hora arg en horario estandar)
    - cron: "15 21 * * 1-5"
  workflow_dispatch:      # permite ejecutarlo a mano desde la pestana Actions
    inputs:
      force_notify:
        description: "Forzar notificacion de prueba aunque no haya cambio"
        type: boolean
        default: false

permissions:
  contents: write   # necesario para commitear el historial de senales

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ejecutar agente
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALWAYS_NOTIFY: ${{ (vars.ALWAYS_NOTIFY == '1' || inputs.force_notify) && '1' || '0' }}
          COMMISSION_PCT: ${{ vars.COMMISSION_PCT }}
          PORTFOLIO_KEY: ${{ secrets.PORTFOLIO_KEY }}
        run: python agent.py

      - name: Guardar historial de senales
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals_log.csv
          git diff --staged --quiet && echo "Sin cambios en el historial." && exit 0
          git commit -m "Registrar senal del $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
